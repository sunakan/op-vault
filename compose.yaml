---

#
# json-file driver accumulates logs without limit by default.
# Rotate at 30 MB and keep up to 5 generations to prevent disk exhaustion.
#
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "30m"
    max-file: "5"

services:
  # jaegertracing/jaeger
  # https://hub.docker.com/r/jaegertracing/jaeger
  jaeger:
    logging:
      <<: *default-logging
    image: jaegertracing/jaeger:2.19.0@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    ports:
      - "16686:16686"
      - "16687:16687"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:16686/"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
