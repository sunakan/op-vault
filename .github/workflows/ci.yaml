name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: fmt/lint
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      MISE_YES: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install mise
        run: curl -sSfL https://mise.run | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache mise tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml') }}
      - name: Install C lint tools
        run: brew install cppcheck llvm
      - run: make fmt
      - name: Check no diff
        run: git diff --exit-code
      - run: make lint

  unit:
    name: unit
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make test

  e2e:
    name: e2e
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      MISE_YES: "1"
      MISE_ENV: ci
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install mise
        run: curl -sSfL https://mise.run | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache mise tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', 'mise.ci.toml') }}
      - name: Install mise tools
        run: mise install
      - name: Run E2E tests
        run: make e2e-test
