version: 2

builds:
  - id: op-vault
    main: ./cmd/op-vault
    binary: op-vault
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - repository:
      owner: sunakan
      name: homebrew-op-vault
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/sunakan/op-vault"
    description: "Cache op:// secrets in macOS Keychain"
    install: |
      bin.install "op-vault"
    test: |
      system "#{bin}/op-vault", "version"

release:
  github:
    owner: sunakan
    name: op-vault
  draft: false
  prerelease: auto
